name: Backend

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-workflow.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-workflow.yml'

jobs:
  build-and-test:
    name: Build, Test and Analyze
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: SonarCloud - Start
        run: | 
          dotnet sonarscanner begin \
            /k:"${{ secrets.SONAR_PROJECT_KEY }}" \
            /o:"${{ secrets.SONAR_ORGANIZATION }}" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Restore
        run: dotnet restore backend/CloudCrypto.slnx

      - name: Build
        run: dotnet build backend/CloudCrypto.slnx --no-restore -c Release

      - name: Unit Tests
        run: |
          dotnet test backend/tests/CloudCrypto.UnitTests/CloudCrypto.UnitTests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: Integration Tests
        run: |
          dotnet test backend/tests/CloudCrypto.IntegrationTests/CloudCrypto.IntegrationTests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      - name: SonarCloud — End
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
      
      - name: Publish
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: dotnet publish backend/src/CloudCrypto.Functions/CloudCrypto_Functions.csproj -c Release -o ./published

      - name: Login to Azure
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Functions
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: Azure/functions-action@v1
        with:
            app-name: func-cloudcrypto2
            package: ./published
            scm-do-build-during-deployment: false
      




