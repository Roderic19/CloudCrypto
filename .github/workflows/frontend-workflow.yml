name: Frontend

on:
  workflow_dispatch: 
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-workflow.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-workflow.yml'

jobs:
  build-and-test:
    name: Analyze, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/cloud-crypto/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/cloud-crypto

      - name: Generate environment files
        run: |
          mkdir -p frontend/cloud-crypto/src/environments
          cat > frontend/cloud-crypto/src/environments/environment.ts << 'EOF'
          export const environment = {
            production: true,
            apiUrl: '${{ secrets.AZURE_FUNCTIONS_URL }}'
          };
          EOF
          cat > frontend/cloud-crypto/src/environments/environment.development.ts << 'EOF'
          export const environment = {
            production: false,
            apiUrl: 'http://localhost:7071'
          };
          EOF

      - name: Analyze
        run: npm run lint
        working-directory: frontend/cloud-crypto

      - name: Test
        run: npm run test -- --watch=false
        working-directory: frontend/cloud-crypto

      - name: Build
        run: npm run build -- --configuration production
        working-directory: frontend/cloud-crypto

      - name: Deploy to Azure Static Web Apps
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/cloud-crypto
          output_location: dist/cloud-crypto/browser
          skip_app_build: true
