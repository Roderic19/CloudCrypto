name: Frontend

on:
  workflow_dispatch: 
  push:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-workflow.yml'
  pull_request:
    branches: [main, dev]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-workflow.yml'

jobs:
  build-and-test:
    name: Analyze, Test and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/cloud-crypto/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/cloud-crypto

      - name: Analyze
        run: npm run lint
        working-directory: frontend/cloud-crypto

      - name: Test
        run: npm run test -- --watch=false
        working-directory: frontend/cloud-crypto

      - name: Build
        run: npm run build -- --configuration production
        working-directory: frontend/cloud-crypto
